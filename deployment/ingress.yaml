apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ing-test
  namespace: alpha
spec:
  ingressClassName: azure-application-gateway
  rules:
    - host: agwy-ingress-test.razumovsky.me
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: nginx-service
                port:
                  number: 80
