apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ing-test
  namespace: alpha
  annotations:
    appgw.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  ingressClassName: azure-application-gateway
  tls:
    - hosts:
        - agwy-ingress-test.razumovsky.me
      secretName: razumovsky-certificate
  rules:
    - host: agwy-ingress-test.razumovsky.me
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: nginx-service
                port:
                  number: 80
